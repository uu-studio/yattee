name: Build Yattee (macOS Latest)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-latest  # 自动使用最新 macOS 26 镜像

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Cache Pods
        uses: actions/cache@v4
        with:
          path: |
            Pods
            ~/.cocoapods
          key: ${{ runner.os }}-yattee-pods-${{ hashFiles('**/Podfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-yattee-pods-

      - name: Install Pods
        run: pod install --repo-update

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -workspace Yattee.xcworkspace \
            -scheme Yattee \
            -destination 'platform=iOS Simulator,name=iPhone 16 Pro,OS=latest' \
            -configuration Release \
            clean build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            ONLY_ACTIVE_ARCH=NO

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Yattee-iOS-Simulator
          path: ~/Library/Developer/Xcode/DerivedData/Yattee-*/Build/Products/Release-iphonesimulator/Yattee.app
